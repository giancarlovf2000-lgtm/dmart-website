<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sin conexión — Portal D'Mart</title>
<style>
  html,body{height:100%;margin:0}
  body{display:flex;align-items:center;justify-content:center;background:#F4F3F1;
       font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:#1A1A1A;padding:24px;text-align:center}
  .card{max-width:380px}
  .mark{width:84px;height:84px;border-radius:22px;overflow:hidden;margin:0 auto 22px;box-shadow:0 6px 18px rgba(212,0,0,.25)}
  .mark img{width:100%;height:100%;object-fit:cover;display:block}
  h1{font-size:22px;margin:0 0 8px}
  p{color:#5A5A5A;font-size:15px;line-height:1.5;margin:0 0 22px}
  button{background:#D40000;color:#fff;border:0;border-radius:999px;padding:12px 26px;
         font-size:15px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
  <div class="card">
    <div class="mark"><img src="/icons/icon-512.png" alt="D'Mart"></div>
    <h1>Sin conexión</h1>
    <p>No hay conexión a internet en este momento. Revisa tu red e intenta de nuevo para seguir trabajando tus leads.</p>
    <button onclick="location.reload()">Reintentar</button>
  </div>
</body>
</html>
